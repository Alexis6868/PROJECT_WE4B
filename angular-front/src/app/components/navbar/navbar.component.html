<nav class="navbar navbar-expand-custom">
  <div class="container-fluid navbar-inner">
    <a routerLink="/" class="logo navbar-brand" (click)="closeMenu()">
      <span class="logo1">Tank</span>
      <span class="logo2">Rent</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMenu()"
      aria-controls="mainNavbar"
      [attr.aria-expanded]="menuOpen"
      aria-label="Ouvrir le menu"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse nav-links" [class.show]="menuOpen" id="mainNavbar">
      <div class="navbar-nav ms-auto">
        <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
        <a class="nav-link" routerLink="/tanks" routerLinkActive="active" (click)="closeMenu()">Catalogue</a>

        <ng-container *ngIf="!(authService.isLoggedIn$ | async)">
          <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
          <a class="nav-link" routerLink="/register" routerLinkActive="active" (click)="closeMenu()">Register</a>
        </ng-container>

        <ng-container *ngIf="authService.isLoggedIn$ | async">
          <span class="user-name">
            Pilote : <strong>{{ authService.userName$ | async }}</strong>
          </span>
          <button type="button" (click)="onLogout()" class="logout-btn">
            Deconnexion
          </button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
