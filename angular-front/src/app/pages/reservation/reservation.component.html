<form [formGroup]="reservationForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">Date de début</label>
          <input 
            type="date" 
            formControlName="dateDebut"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" />
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wide text-gray-700 mb-1">Date de fin (Restitution)</label>
          <input 
            type="date" 
            formControlName="dateFin"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none" />
        </div>

        <button 
          type="submit" 
          [disabled]="reservationForm.invalid"
          class="w-full bg-orange-500 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-orange-600 transition-colors uppercase tracking-wider text-sm mt-4 disabled:opacity-50 disabled:cursor-not-allowed">
          Confirmer la demande
        </button>
      </form>
