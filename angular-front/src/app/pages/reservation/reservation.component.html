<div class="resa-page">
  <div class="resa-glow"></div>

  <!-- Chargement -->
  <div *ngIf="loading" class="resa-loading">
    <div class="resa-spinner"></div>
    <p>Chargement du blindé…</p>
  </div>

  <div *ngIf="!loading" class="resa-layout">

    <!-- Fiche blindé -->
    <div class="resa-tank-card" *ngIf="tank">
      <div class="resa-tank-image-wrap">
        <img *ngIf="tank.image" [src]="tank.image" [alt]="tank.nom" class="resa-tank-image">
        <div *ngIf="!tank.image" class="resa-tank-no-image">Pas d'image</div>
        <span *ngIf="tank.pays" class="resa-tank-badge">{{ tank.pays }}</span>
      </div>
      <div class="resa-tank-info">
        <span class="resa-tank-type">{{ tank.type }}</span>
        <h2 class="resa-tank-name">{{ tank.nom }}</h2>
        <div class="resa-tank-specs">
          <div class="spec">
            <span class="spec-label">Masse</span>
            <span class="spec-value">{{ tank.masse }} t</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulaire réservation -->
    <div class="resa-form-card">
      <span class="resa-kicker">Réservation</span>
      <h2 class="resa-form-title">Choisir vos dates</h2>

      <form [formGroup]="reservationForm" (ngSubmit)="onSubmit()" class="resa-form">

        <div class="field">
          <label class="field-label">Date de début</label>
          <input type="date" formControlName="dateDebut" class="field-input">
        </div>

        <div class="field">
          <label class="field-label">Date de fin (restitution)</label>
          <input type="date" formControlName="dateFin" class="field-input">
        </div>

        <button type="submit" [disabled]="reservationForm.invalid" class="resa-btn">
          Confirmer la demande
        </button>

      </form>
    </div>

  </div>
</div>
