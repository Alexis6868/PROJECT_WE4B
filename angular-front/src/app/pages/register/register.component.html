<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-kicker">Recrutement</span>
      <h1 class="auth-title">Enrôlement</h1>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="fields-row">
        <div class="field">
          <label class="field-label">Prénom *</label>
          <input type="text" formControlName="prenom"
                 class="field-input" placeholder="Jean">
        </div>
        <div class="field">
          <label class="field-label">Nom *</label>
          <input type="text" formControlName="nom"
                 class="field-input" placeholder="Martin">
        </div>
      </div>

      <div class="field">
        <label class="field-label">Téléphone</label>
        <input type="tel" formControlName="tel"
               class="field-input" placeholder="06 12 34 56 78">
      </div>

      <div class="field">
        <label class="field-label">Email *</label>
        <input type="email" formControlName="email"
               class="field-input" placeholder="nom@exemple.com">
        <span *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
              class="field-error">Un email valide est requis.</span>
      </div>

      <div class="field">
        <label class="field-label">Mot de passe *</label>
        <input type="password" formControlName="password"
               class="field-input" placeholder="6 caractères minimum">
        <span *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
              class="field-error">Au moins 6 caractères.</span>
      </div>

      <div *ngIf="message" class="auth-success">{{ message }}</div>

      <button type="submit" [disabled]="registerForm.invalid" class="auth-btn">
        Créer mon compte
      </button>

    </form>

    <p class="auth-footer">
      Déjà enrôlé ?
      <a routerLink="/login">Connexion</a>
    </p>
  </div>
</div>
