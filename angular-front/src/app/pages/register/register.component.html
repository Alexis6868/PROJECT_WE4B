<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Rejoindre la division TankRent</h2>
          
          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email de l'officier</label>
              <input type="email" formControlName="email" class="form-control" placeholder="nom@exemple.com">
              <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-danger small">
                Un email valide est requis.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe secret</label>
              <input type="password" formControlName="password" class="form-control" placeholder="6 caractères minimum">
              <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-danger small">
                Le mot de passe doit faire au moins 6 caractères.
              </div>
            </div>

            <button type="submit" [disabled]="registerForm.invalid" class="btn btn-primary w-100 mt-3">
              Créer mon compte
            </button>
          </form>

          <div *ngIf="message" class="alert alert-info mt-3 text-center">
            {{ message }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
