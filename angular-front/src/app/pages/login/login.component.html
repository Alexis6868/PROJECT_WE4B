<div class="auth-page">
  <div class="auth-glow"></div>

  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-kicker">Poste de commandement</span>
      <h1 class="auth-title">Connexion</h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" formControlName="email"
               class="field-input" placeholder="nom@exemple.com">
      </div>

      <div class="field">
        <label class="field-label">Mot de passe</label>
        <input type="password" formControlName="password"
               class="field-input" placeholder="••••••••">
      </div>

      <div *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loginForm.invalid" class="auth-btn">
        S'authentifier
      </button>

    </form>

    <p class="auth-footer">
      Pas encore de compte ?
      <a routerLink="/register">Enrôlement ici</a>
    </p>
  </div>
</div>
