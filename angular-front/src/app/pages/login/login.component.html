<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Connexion au Poste de Commandement</h2>
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Identifiant (Email)</label>
              <input type="email" formControlName="email" class="form-control" placeholder="nom@exemple.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" formControlName="password" class="form-control" placeholder="Mot de passe">
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn btn-success w-100 mt-3">
              S'authentifier
            </button>
          </form>

          <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
            {{ errorMessage }}
          </div>

          <div class="text-center mt-4">
            <a routerLink="/register" class="small text-muted">Pas encore de compte ? Enrôlez-vous ici.</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
