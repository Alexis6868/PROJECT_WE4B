<div class="catalog-container">

  <h1>Arsenal <span>disponible</span></h1>

  <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

  <app-search-bar (searchChange)="filterCatalog($event)"></app-search-bar>

  <div class="filters-row">
    <select (change)="sortCatalog($any($event.target).value)" class="filter-select">
      <option value="nom">Nom (A–Z)</option>
      <option value="masseAsc">Masse : léger → lourd</option>
      <option value="masseDesc">Masse : lourd → léger</option>
    </select>

    <select (change)="filterByPays($any($event.target).value)" class="filter-select">
      <option value="">Tous les pays</option>
      <option *ngFor="let pays of availableCountries" [value]="pays">{{ pays }}</option>
    </select>
  </div>

  <div class="tanks-grid">
    <app-tank-card *ngFor="let unTank of pagedTanks" [tank]="unTank"></app-tank-card>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button class="page-btn page-btn--nav" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">&#8592;</button>

    <ng-container *ngFor="let p of pageNumbers">
      <button *ngIf="p !== '…'" class="page-btn" [class.page-btn--active]="p === currentPage" (click)="goToPage(+p)">{{ p }}</button>
      <span *ngIf="p === '…'" class="page-ellipsis">…</span>
    </ng-container>

    <button class="page-btn page-btn--nav" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">&#8594;</button>
  </div>

  <p class="results-count" *ngIf="filteredTanks.length > 0">
    {{ pageStart }}–{{ pageEnd }} sur {{ filteredTanks.length }} blindés
  </p>

</div>
